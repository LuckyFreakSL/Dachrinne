<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dachrinnen – WE 424 Südtondern-Kaserne</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap');

  :root {
    --bg: #1a1a1a;
    --surface: #242424;
    --border: #333;
    --accent: #f0a500;
    --accent2: #e05c00;
    --text: #f0ece4;
    --muted: #888;
    --done-bg: #1e2e1e;
    --done-border: #3a5a3a;
    --done-text: #6aaa6a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    padding: 0 0 60px 0;
  }

  header {
    background: linear-gradient(135deg, #111 0%, #1c1c1c 100%);
    border-bottom: 3px solid var(--accent);
    padding: 20px 24px 16px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  header h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem;
    letter-spacing: 2px;
    color: var(--accent);
    line-height: 1;
  }

  header .sub {
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 1px;
    margin-top: 4px;
  }

  .stats-bar {
    display: flex;
    gap: 12px;
    margin-top: 14px;
    flex-wrap: wrap;
  }

  .stat {
    background: #111;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 14px;
    flex: 1;
    min-width: 120px;
    text-align: center;
  }

  .stat-val {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.6rem;
    color: var(--accent);
    line-height: 1;
  }

  .stat-val.green { color: #6aaa6a; }

  .stat-label {
    font-size: 0.6rem;
    color: var(--muted);
    letter-spacing: 1px;
    margin-top: 2px;
  }

  .progress-wrap {
    margin-top: 12px;
    height: 6px;
    background: #111;
    border-radius: 999px;
    overflow: hidden;
  }

  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--accent2), var(--accent));
    border-radius: 999px;
    transition: width 0.5s cubic-bezier(.4,0,.2,1);
  }

  .day-reset {
    margin: 14px 24px 0;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .day-reset button {
    background: var(--accent2);
    color: #fff;
    border: none;
    border-radius: 6px;
    padding: 7px 16px;
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    cursor: pointer;
    letter-spacing: 1px;
    transition: background 0.2s;
  }

  .day-reset button:hover { background: #c04400; }

  .day-meter {
    font-size: 0.75rem;
    color: var(--muted);
  }

  .day-meter span {
    color: var(--accent);
    font-weight: 500;
  }

  .section-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1rem;
    letter-spacing: 3px;
    color: var(--muted);
    padding: 20px 24px 8px;
    border-bottom: 1px solid var(--border);
  }

  .building-list {
    padding: 0 16px;
    margin-top: 12px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .building-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 4px solid var(--accent2);
    border-radius: 8px;
    padding: 12px 14px;
    display: flex;
    align-items: center;
    gap: 14px;
    cursor: pointer;
    transition: all 0.25s ease;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }

  .building-card:active { transform: scale(0.98); }

  .building-card.done {
    background: var(--done-bg);
    border-color: var(--done-border);
    border-left-color: var(--done-text);
    opacity: 0.75;
  }

  .checkbox {
    width: 26px;
    height: 26px;
    border-radius: 50%;
    border: 2px solid var(--accent2);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.2s;
    font-size: 14px;
  }

  .done .checkbox {
    background: var(--done-text);
    border-color: var(--done-text);
    color: #fff;
  }

  .building-info {
    flex: 1;
  }

  .building-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.3rem;
    color: var(--text);
    letter-spacing: 1px;
    line-height: 1;
  }

  .done .building-num { color: var(--done-text); }

  .building-meta {
    font-size: 0.62rem;
    color: var(--muted);
    margin-top: 3px;
    letter-spacing: 0.5px;
  }

  .building-note {
    font-size: 0.65rem;
    color: var(--accent);
    margin-top: 2px;
  }

  .done .building-note { color: var(--muted); }

  .meter-badge {
    background: #111;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 10px;
    text-align: right;
    flex-shrink: 0;
  }

  .meter-val {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.3rem;
    color: var(--accent);
    line-height: 1;
  }

  .done .meter-val { color: var(--done-text); }

  .meter-unit {
    font-size: 0.55rem;
    color: var(--muted);
    letter-spacing: 1px;
  }

  .reset-all-wrap {
    padding: 24px 16px 0;
    text-align: center;
  }

  .reset-all {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 20px;
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    cursor: pointer;
    letter-spacing: 1px;
    transition: all 0.2s;
  }

  .reset-all:hover { border-color: #e05c00; color: #e05c00; }

  .done-section { opacity: 0.6; }
</style>
</head>
<body>

<header>
  <h1>Dachrinnen-Tour</h1>
  <div class="sub">WE 424 · SÜDTONDERN-KASERNE · STADUM · ANLAGE 2O</div>

  <div class="stats-bar">
    <div class="stat">
      <div class="stat-val" id="statGebDone">0</div>
      <div class="stat-label">GEBÄUDE ERLEDIGT</div>
    </div>
    <div class="stat">
      <div class="stat-val" id="statGebTotal">16</div>
      <div class="stat-label">GESAMT</div>
    </div>
    <div class="stat">
      <div class="stat-val green" id="statMeterDone">0</div>
      <div class="stat-label">LFD. METER ✓</div>
    </div>
    <div class="stat">
      <div class="stat-val" id="statMeterLeft">3735</div>
      <div class="stat-label">METER OFFEN</div>
    </div>
  </div>

  <div class="progress-wrap">
    <div class="progress-bar" id="progressBar" style="width:0%"></div>
  </div>
</header>

<div class="day-reset">
  <div class="day-meter">Heute: <span id="dayMeter">0</span> lfd. Meter</div>
  <button onclick="resetDay()">↺ Tag zurücksetzen</button>
</div>

<div class="section-title" id="sec1title">SEITE 1 – GEBÄUDE 1–28</div>
<div class="building-list" id="buildingList1"></div>

<div class="section-title" id="sec2title" style="margin-top:16px">SEITE 2 – GEBÄUDE 33–55</div>
<div class="building-list" id="buildingList2"></div>

<div class="reset-all-wrap">
  <button class="reset-all" onclick="resetAll()">Alle zurücksetzen</button>
</div>

<script>
const buildings = [
  // --- Seite 1 ---
  { id: '1',       meter: 55,  hoehe: 3,         fallrohre: 4,  note: '' },
  { id: '5',       meter: 62,  hoehe: 6,         fallrohre: 4,  note: '' },
  { id: '6/7',     meter: 71,  hoehe: 6,         fallrohre: 8,  note: '' },
  { id: '8',       meter: 160, hoehe: 3,         fallrohre: 12, note: '' },
  { id: '12',      meter: 118, hoehe: 6,         fallrohre: 15, note: '' },
  { id: '14',      meter: 157, hoehe: '3/8',     fallrohre: 21, note: '' },
  { id: '15',      meter: 68,  hoehe: 6,         fallrohre: 6,  note: '' },
  { id: '16',      meter: 68,  hoehe: 6,         fallrohre: 6,  note: '' },
  { id: '17',      meter: 44,  hoehe: 6,         fallrohre: 4,  note: '' },
  { id: '18',      meter: 26,  hoehe: 3,         fallrohre: 2,  note: '' },
  { id: '19',      meter: 56,  hoehe: 7,         fallrohre: 5,  note: '' },
  { id: '20/1',    meter: 152, hoehe: 7,         fallrohre: 12, note: '' },
  { id: '20/2',    meter: 74,  hoehe: 7,         fallrohre: 4,  note: '' },
  { id: '20/3',    meter: 36,  hoehe: 3,         fallrohre: 4,  note: '' },
  { id: '21',      meter: 96,  hoehe: 3.6,       fallrohre: 8,  note: '' },
  { id: '22/1',    meter: 152, hoehe: 7,         fallrohre: 12, note: '' },
  { id: '22/2',    meter: 74,  hoehe: 7,         fallrohre: 4,  note: '' },
  { id: '22/3',    meter: 36,  hoehe: 3,         fallrohre: 4,  note: '' },
  { id: '23',      meter: 100, hoehe: 3,         fallrohre: 11, note: '' },
  { id: '24/1',    meter: 116, hoehe: 7,         fallrohre: 10, note: '' },
  { id: '25',      meter: 164, hoehe: 4,         fallrohre: 16, note: '' },
  { id: '26/1',    meter: 159, hoehe: 7,         fallrohre: 12, note: '' },
  { id: '27/1,27/2', meter: 202, hoehe: 3,       fallrohre: 12, note: '' },
  { id: '27/3',    meter: 3.5, hoehe: 3,         fallrohre: 1,  note: '' },
  { id: '28',      meter: 118, hoehe: 4,         fallrohre: 10, note: '' },
  // --- Seite 2 ---
  { id: '33',      meter: 75,  hoehe: 7.5,       fallrohre: 9,  note: '' },
  { id: '34',      meter: 64,  hoehe: 4,         fallrohre: 6,  note: '' },
  { id: '35',      meter: 26,  hoehe: 5,         fallrohre: 4,  note: '' },
  { id: '36',      meter: 8,   hoehe: 3,         fallrohre: 2,  note: '' },
  { id: '37',      meter: 77,  hoehe: 3.5,       fallrohre: 8,  note: '' },
  { id: '37b',     meter: 110, hoehe: 4,         fallrohre: 16, note: 'Bürobereich' },
  { id: '38',      meter: 299, hoehe: '2,5/3/6/8', fallrohre: 25, note: 'var. Dachhöhen' },
  { id: '40',      meter: 42,  hoehe: 5.6,       fallrohre: 6,  note: '' },
  { id: '41',      meter: 127, hoehe: 7,         fallrohre: 8,  note: '' },
  { id: '45',      meter: 58,  hoehe: 5.5,       fallrohre: 4,  note: '' },
  { id: '46',      meter: 64,  hoehe: 3,         fallrohre: 4,  note: '' },
  { id: '47',      meter: 60,  hoehe: 6,         fallrohre: 6,  note: '' },
  { id: '48',      meter: 60,  hoehe: 6,         fallrohre: 6,  note: '' },
  { id: '49',      meter: 94,  hoehe: 6,         fallrohre: 8,  note: '' },
  { id: '50',      meter: 94,  hoehe: 6,         fallrohre: 8,  note: '' },
  { id: '54',      meter: 86,  hoehe: 8.5,       fallrohre: 6,  note: '' },
  { id: '55',      meter: 24,  hoehe: 3,         fallrohre: 2,  note: '' },
];

const TOTAL_METER = buildings.reduce((s, b) => s + b.meter, 0);

function loadState() {
  try { return JSON.parse(localStorage.getItem('dachrinnen_state') || '{}'); } catch { return {}; }
}
function saveState(state) {
  try { localStorage.setItem('dachrinnen_state', JSON.stringify(state)); } catch {}
}
function loadDay() {
  try { return JSON.parse(localStorage.getItem('dachrinnen_day') || '{"meter":0,"ids":[]}'); } catch { return {meter:0,ids:[]}; }
}
function saveDay(day) {
  try { localStorage.setItem('dachrinnen_day', JSON.stringify(day)); } catch {}
}

let state = loadState();
let day = loadDay();

function toggle(id) {
  const key = String(id);
  const b = buildings.find(b => String(b.id) === key);
  if (!b) return;

  if (state[key]) {
    delete state[key];
    day.meter = Math.max(0, day.meter - b.meter);
    day.ids = day.ids.filter(x => x !== key);
  } else {
    state[key] = true;
    if (!day.ids.includes(key)) {
      day.meter += b.meter;
      day.ids.push(key);
    }
  }
  saveState(state);
  saveDay(day);
  render();
}

function resetDay() {
  day = {meter: 0, ids: []};
  saveDay(day);
  document.getElementById('dayMeter').textContent = 0;
}

function resetAll() {
  if (!confirm('Wirklich alle Gebäude zurücksetzen?')) return;
  state = {};
  day = {meter: 0, ids: []};
  saveState(state);
  saveDay(day);
  render();
}

function render() {
  const done = buildings.filter(b => state[String(b.id)]);
  const doneMeter = done.reduce((s, b) => s + b.meter, 0);
  const pct = Math.round((done.length / buildings.length) * 100);

  document.getElementById('statGebDone').textContent = done.length;
  document.getElementById('statGebTotal').textContent = buildings.length;
  document.getElementById('statMeterDone').textContent = doneMeter;
  document.getElementById('statMeterLeft').textContent = TOTAL_METER - doneMeter;
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('dayMeter').textContent = day.meter;

  const list1 = document.getElementById('buildingList1');
  const list2 = document.getElementById('buildingList2');
  list1.innerHTML = '';
  list2.innerHTML = '';

  const page1ids = ['1','5','6/7','8','12','14','15','16','17','18','19','20/1','20/2','20/3','21','22/1','22/2','22/3','23','24/1','25','26/1','27/1,27/2','27/3','28'];
  const isPage1 = b => page1ids.includes(String(b.id));

  const renderTo = (container, list) => {
    const pending = list.filter(b => !state[String(b.id)]);
    const doneB = list.filter(b => state[String(b.id)]);
    [...pending, ...doneB].forEach(b => {
      const isDone = !!state[String(b.id)];
      const card = document.createElement('div');
      card.className = 'building-card' + (isDone ? ' done' : '');
      card.onclick = () => toggle(b.id);
      card.innerHTML = `
        <div class="checkbox">${isDone ? '✓' : ''}</div>
        <div class="building-info">
          <div class="building-num">Gebäude ${b.id}</div>
          <div class="building-meta">Höhe ${b.hoehe} m · ${b.fallrohre} Fallrohre · 1× jährlich</div>
          ${b.note ? `<div class="building-note">${b.note}</div>` : ''}
        </div>
        <div class="meter-badge">
          <div class="meter-val">${b.meter}</div>
          <div class="meter-unit">LFD. M</div>
        </div>
      `;
      container.appendChild(card);
    });
  };

  renderTo(list1, buildings.filter(isPage1));
  renderTo(list2, buildings.filter(b => !isPage1(b)));
}

render();
</script>
</body>
</html>
